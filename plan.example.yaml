# CONDUCTOR plan — declare tasks with time windows, budgets, and priorities.
# Copy to plan.yaml and edit.

budget:
  daily_usd: 5.00
  hourly_usd: 1.00   # optional; rolling 60 minutes

# Optional subscription quota — the budget gate for kind=claude tasks.
# Burn is estimated from Claude Code's local transcripts (+ mesh workers).
# Watch `conductor quota` for a few days, then set ceilings; unset = observe only.
# subscription:
#   five_hour_tokens: 6000000
#   weekly_tokens: 300000000
#   reserve: 0.15               # headroom kept for your interactive use

# Optional compute mesh — use your own machines as execution nodes.
# Run `conductor hub` on one reachable machine (tailnet address recommended)
# and `conductor worker --hub <url> [--allow-shell]` on each device.
# mesh:
#   hub: "http://100.64.0.3:4747"

models:
  # price is USD per 1M tokens. Current rates (2026-07) from
  # https://platform.claude.com/docs/en/pricing — verify before relying on them.
  opus:   { id: claude-opus-4-8,  price_in: 5.00, price_out: 25.00 }
  # Sonnet 5 sticker is $3/$15; intro pricing $2/$10 runs through 2026-08-31.
  sonnet: { id: claude-sonnet-5,  price_in: 3.00, price_out: 15.00 }
  haiku:  { id: claude-haiku-4-5, price_in: 1.00, price_out: 5.00 }

# Optional agent workspaces — persistent containers where other agents live
# (OpenClaw, Hermes, your own). Created + set up once; tasks exec into the room.
# workspaces:
#   openclaw:
#     image: node:22-bookworm
#     setup: "npm install -g openclaw"
#     node: homebox

tasks:
  - id: morning-digest
    prompt_file: prompts/digest.md
    window: { earliest: "07:00", deadline: "09:00" }
    model: sonnet
    max_output_tokens: 2000
    priority: high
    on_budget_exceeded: downgrade   # downgrade | defer | skip

  - id: refactor-scan
    prompt_file: prompts/scan.md
    depends_on: [morning-digest]
    window: { earliest: "09:00" }   # no deadline — runs any time after 09:00
    model: opus
    max_output_tokens: 4000
    priority: med
    on_budget_exceeded: defer

  - id: quick-note
    prompt: "One sentence: what is the single highest-leverage thing a solo founder should do before 10am?"
    model: haiku
    max_output_tokens: 200
    priority: low
    on_budget_exceeded: skip

